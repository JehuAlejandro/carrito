<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito | Pintumex</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.contenedor{
max-width:500px;
margin:80px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.producto{
border-bottom:1px solid #ddd;
padding:12px 0;
position:relative;
}

.nombre{
font-weight:bold;
}

.precio{
color:#555;
}

.cantidad{
display:flex;
align-items:center;
gap:10px;
margin-top:5px;
}

.cantidad button{
width:30px;
height:30px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:5px;
font-size:18px;
}

.borrar{
position:absolute;
right:0;
top:10px;
background:#ff4d4d;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
font-size:14px;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:15px;
}

.vaciar{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:#ff4d4d;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.whatsapp{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#25D366;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="contenedor">

<h2>Tu carrito</h2>

<div id="carrito"></div>

<div class="total" id="total"></div>

<button class="vaciar" onclick="vaciarCarrito()">🗑 Vaciar carrito</button>

<button class="whatsapp" onclick="enviarWhatsApp()">
Enviar pedido por WhatsApp
</button>

</div>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar(){
localStorage.setItem("carrito", JSON.stringify(carrito));
}

function mostrarCarrito(){

let contenedor = document.getElementById("carrito");
let total = 0;

contenedor.innerHTML = "";

carrito.forEach((producto, index)=>{

let subtotal = producto.precio * producto.cantidad;
total += subtotal;

contenedor.innerHTML += `
<div class="producto">

<button class="borrar" onclick="eliminarProducto(${index})">🗑</button>

<div class="nombre">${producto.nombre}</div>
<div class="precio">Precio: $${producto.precio}</div>

<div class="cantidad">
<button onclick="cambiarCantidad(${index},-1)">-</button>
${producto.cantidad}
<button onclick="cambiarCantidad(${index},1)">+</button>
</div>

<div>Subtotal: $${subtotal}</div>

</div>
`;

});

document.getElementById("total").innerText="Total: $"+total;

}

function cambiarCantidad(index,cambio){

carrito[index].cantidad += cambio;

if(carrito[index].cantidad <=0){
carrito.splice(index,1);
}

guardar();
mostrarCarrito();

}

function eliminarProducto(index){

carrito.splice(index,1);
guardar();
mostrarCarrito();

}

function vaciarCarrito(){

carrito=[];
guardar();
mostrarCarrito();

}

function enviarWhatsApp(){

let mensaje="Pedido:%0A";
let total=0;

carrito.forEach(p=>{

let subtotal=p.precio*p.cantidad;

mensaje+=`${p.nombre}%0A`;
mensaje+=`Cantidad: ${p.cantidad}%0A`;
mensaje+=`Subtotal: $${subtotal}%0A%0A`;

total+=subtotal;

});

mensaje+=`TOTAL: $${total}`;

window.open(`https://wa.me/5217771537270?text=${mensaje}`);

}

mostrarCarrito();

</script>

</body>
</html>
