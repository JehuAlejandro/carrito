<meta charset="UTF-8">

<style>

body{
font-family:Arial;

}

/* HEADER */

.header{

}

}

.seccion{

.carrito-panel{

}

}

}

.btn-whatsapp{

}

</style>
</head>

<body>

<div class="header">

<div class="logo">Pintumex</div>

<div class="carrito" onclick="abrirCarrito()">
🛒
<div class="burbuja" id="contador">0</div>
</div>

</div>

<!-- PRODUCTO -->

<section class="seccion">

<img class="imagen"
src="https://pintumex.com.mx/wp-content/uploads/Mock-Up-2025-Supervin-Frente-19-L.png">

<div>

<h1>SUPERVIN 210 BLANCO OSTIÓN</h1>

<div class="precio">$3,176 MXN</div>

<button class="btn"
onclick="agregarProducto(
'SUPERVIN 210 BLANCO OSTIÓN',
'19L',
3176,
'https://pintumex.com.mx/wp-content/uploads/Mock-Up-2025-Supervin-Frente-19-L.png'
)">
Agregar 19L – $3,176
</button>

<button class="btn"
onclick="agregarProducto(
'SUPERVIN 210 BLANCO OSTIÓN',
'4L',
722,
'https://pintumex.com.mx/wp-content/uploads/Mock-Up-2025-Supervin-Frente-19-L.png'
)">
Agregar 4L – $722
</button>

<button class="btn"
onclick="agregarProducto(
'SUPERVIN 210 BLANCO OSTIÓN',
'1L',
205,
'https://pintumex.com.mx/wp-content/uploads/Mock-Up-2025-Supervin-Frente-19-L.png'
)">
Agregar 1L – $205
</button>

</div>

</section>

<!-- PANEL CARRITO -->

<div id="carritoPanel" class="carrito-panel">

<div class="carrito-header">
<h3>Tu carrito</h3>
<button onclick="cerrarCarrito()">✖</button>
</div>

<div id="listaCarrito"></div>

<div class="carrito-footer">

<p>Total: $<span id="total">0</span></p>

<button class="btn-whatsapp" onclick="enviarPedido()">
Enviar pedido por WhatsApp
</button>

</div>

</div>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar(){
localStorage.setItem("carrito", JSON.stringify(carrito));
}

function actualizarCarrito(){

const lista = document.getElementById("listaCarrito");
const contador = document.getElementById("contador");
const totalHTML = document.getElementById("total");

lista.innerHTML="";

let total=0;
let cantidad=0;

carrito.forEach((p,i)=>{

const subtotal = p.precio * p.cantidad;

total += subtotal;
cantidad += p.cantidad;

lista.innerHTML += `
<div class="producto-carrito">

<img src="${p.imagen}">

<div>

<strong>${p.nombre}</strong><br>
${p.tamano}<br>

<div class="controles">
<button onclick="restar(${i})">-</button>
${p.cantidad}
<button onclick="sumar(${i})">+</button>
</div>

Subtotal: $${subtotal}

</div>

</div>
`;

});

contador.textContent = cantidad;
totalHTML.textContent = total.toLocaleString();

}

/* AGREGAR PRODUCTO */

function agregarProducto(nombre,tamano,precio,imagen){

const existe = carrito.find(p =>
p.nombre===nombre && p.tamano===tamano
);

if(existe){
existe.cantidad++;
}else{

carrito.push({
nombre:nombre,
tamano:tamano,
precio:precio,
imagen:imagen,
cantidad:1
});

}

guardar();
actualizarCarrito();
abrirCarrito();

}

/* SUMAR */

function sumar(i){
carrito[i].cantidad++;
guardar();
actualizarCarrito();
}

/* RESTAR */

function restar(i){

carrito[i].cantidad--;

if(carrito[i].cantidad<=0){
carrito.splice(i,1);
}

guardar();
actualizarCarrito();

}

/* ABRIR CARRITO */

function abrirCarrito(){
document.getElementById("carritoPanel").classList.add("abierto");
}

/* CERRAR */

function cerrarCarrito(){
document.getElementById("carritoPanel").classList.remove("abierto");
}

/* WHATSAPP */

function enviarPedido(){

let mensaje="🧾 Pedido Pintumex%0A%0A";

let total=0;

carrito.forEach(p=>{

const subtotal=p.precio*p.cantidad;

mensaje+=`${p.nombre} ${p.tamano}%0A`;
mensaje+=`Cantidad: ${p.cantidad}%0A`;
mensaje+=`Subtotal: $${subtotal}%0A%0A`;

total+=subtotal;

});

mensaje+=`TOTAL: $${total}`;

window.open(`https://wa.me/5217771537270?text=${mensaje}`);

}

actualizarCarrito();

</script>

</body>
</html>
