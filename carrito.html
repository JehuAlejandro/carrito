<style>

body{
  font-family: 'Inter', Arial, sans-serif;
  background:#f2f2f2;
}

.contenedor{
  max-width:520px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

h2{
  color:#2968c8;
}

ul{
  list-style:none;
  padding:0;
}

li{
  background:#f8f9fc;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* Botones + - */
button[onclick*="sumar"]{
  background:#00a650;
  color:white;
}

button[onclick*="restar"]{
  background:#2968c8;
  color:white;
}

/* Botón borrar */
.borrar{
  background:#e74c3c;
  color:white;
  margin-left:8px;
}

/* WhatsApp */
.whatsapp{
  width:100%;
  padding:14px;
  background:#25D366;
  color:white;
  font-size:16px;
  margin-top:10px;
}

/* Volver */
.volver{
  width:100%;
  padding:14px;
  background:#2968c8;
  color:white;
  margin-top:10px;
}

#total{
  color:#00a650;
  font-size:22px;
}

</style>
