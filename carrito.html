<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producto</title>

<style>
body{
  font-family: Arial, sans-serif;
}

.producto{
  width: 300px;
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 10px;
  text-align: center;
}

.contador{
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 15px;
}

.contador button{
  width: 40px;
  height: 40px;
  font-size: 20px;
  border: none;
  background: #000;
  color: #fff;
  cursor: pointer;
}

.contador input{
  width: 60px;
  text-align: center;
  font-size: 18px;
  margin: 0 10px;
}
</style>
</head>

<body>

<div class="producto">
  <h2>Nombre del Producto</h2>
  <p>$150.00</p>

  <div class="contador">
    <button onclick="disminuir()">−</button>
    <input type="number" id="cantidad" value="1" min="1">
    <button onclick="aumentar()">+</button>
  </div>
</div>

<script>
function aumentar(){
  let cantidad = document.getElementById("cantidad");
  cantidad.value = parseInt(cantidad.value) + 1;
}

function disminuir(){
  let cantidad = document.getElementById("cantidad");
  if(cantidad.value > 1){
    cantidad.value = parseInt(cantidad.value) - 1;
  }
}
</script>

</body>
</html>
