<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito | Pintumex</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f1f1;
}

/* CONTENEDOR */

.contenedor{
max-width:900px;
margin:40px auto;
display:flex;
gap:20px;
}

/* LISTA PRODUCTOS */

.lista{
flex:3;
background:white;
padding:20px;
border-radius:10px;
}

.producto{
display:flex;
align-items:center;
gap:15px;
border-bottom:1px solid #eee;
padding:15px 0;
}

.producto img{
width:90px;
border-radius:6px;
}

.info{
flex:1;
}

.nombre{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
}

.precio{
color:#0aa84f;
font-size:18px;
font-weight:bold;
}

/* CANTIDAD */

.cantidad{
display:flex;
align-items:center;
gap:8px;
margin-top:8px;
}

.cantidad button{
width:30px;
height:30px;
border:none;
background:#ddd;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

/* ELIMINAR */

.borrar{
background:#ff4d4d;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

/* RESUMEN */

.resumen{
flex:1;
background:white;
padding:20px;
border-radius:10px;
height:fit-content;
}

.resumen h3{
margin-top:0;
}

.total{
font-size:22px;
font-weight:bold;
margin:15px 0;
}

/* BOTONES */

.vaciar{
width:100%;
padding:12px;
border:none;
background:#ff4d4d;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
}

.whatsapp{
width:100%;
padding:12px;
border:none;
background:#25D366;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="contenedor">

<div class="lista">

<h2>Carrito de compras</h2>

<div id="carrito"></div>

</div>


<div class="resumen">

<h3>Resumen</h3>

<div id="total" class="total"></div>

<button class="vaciar" onclick="vaciarCarrito()">
🗑 Vaciar carrito
</button>

<button class="whatsapp" onclick="enviarWhatsApp()">
Enviar pedido por WhatsApp
</button>

</div>

</div>


<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar(){
localStorage.setItem("carrito", JSON.stringify(carrito));
}

function mostrarCarrito(){

let contenedor=document.getElementById("carrito");
let total=0;

contenedor.innerHTML="";

carrito.forEach((producto,index)=>{

let subtotal=producto.precio*producto.cantidad;
total+=subtotal;

contenedor.innerHTML+=`

<div class="producto">

<img src="${producto.imagen}" alt="">

<div class="info">

<div class="nombre">${producto.nombre}</div>

<div class="precio">$${producto.precio}</div>

<div class="cantidad">

<button onclick="cambiarCantidad(${index},-1)">−</button>

${producto.cantidad}

<button onclick="cambiarCantidad(${index},1)">+</button>

</div>

<div>Subtotal: $${subtotal}</div>

</div>

<button class="borrar" onclick="eliminarProducto(${index})">
Eliminar
</button>

</div>

`;

});

document.getElementById("total").innerText="Total: $"+total;

}

function cambiarCantidad(index,cambio){

carrito[index].cantidad+=cambio;

if(carrito[index].cantidad<=0){
carrito.splice(index,1);
}

guardar();
mostrarCarrito();

}

function eliminarProducto(index){

carrito.splice(index,1);
guardar();
mostrarCarrito();

}

function vaciarCarrito(){

carrito=[];
guardar();
mostrarCarrito();

}

function enviarWhatsApp(){

let mensaje="Pedido:%0A";
let total=0;

carrito.forEach(p=>{

let subtotal=p.precio*p.cantidad;

mensaje+=`${p.nombre}%0A`;
mensaje+=`Cantidad: ${p.cantidad}%0A`;
mensaje+=`Subtotal: $${subtotal}%0A%0A`;

total+=subtotal;

});

mensaje+=`TOTAL: $${total}`;

window.open(`https://wa.me/5217771537270?text=${mensaje}`);

}

mostrarCarrito();

</script>

</body>
</html>
