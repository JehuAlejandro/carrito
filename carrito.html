<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pintumex</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* BOTON CARRITO */

.boton-carrito{
position:fixed;
top:20px;
right:20px;
background:#0aa84f;
color:white;
border:none;
padding:12px 15px;
border-radius:50px;
font-size:18px;
cursor:pointer;
z-index:999;
}

/* PANEL CARRITO */

.panel-carrito{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
transition:0.3s;
display:flex;
flex-direction:column;
z-index:1000;
}

.panel-carrito.activo{
right:0;
}

.carrito-header{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #eee;
font-weight:bold;
}

#listaCarrito{
flex:1;
overflow:auto;
padding:10px;
}

.item{
border-bottom:1px solid #eee;
padding:10px;
}

.cantidad{
display:flex;
gap:5px;
margin-top:5px;
}

.cantidad button{
background:#ddd;
border:none;
padding:5px 10px;
cursor:pointer;
}

.carrito-footer{
padding:15px;
border-top:1px solid #eee;
}

.vaciar{
width:100%;
background:#ff4d4d;
color:white;
border:none;
padding:10px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.whatsapp{
width:100%;
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.agregar{
background:#0aa84f;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<h1 style="padding:20px;">Pintumex</h1>

<!-- BOTON CARRITO -->

<button class="boton-carrito" onclick="abrirCarrito()">
🛒 <span id="contador">0</span>
</button>

<!-- PANEL CARRITO -->

<div id="panelCarrito" class="panel-carrito">

<div class="carrito-header">
Tu carrito
<button onclick="cerrarCarrito()">✕</button>
</div>

<div id="listaCarrito"></div>

<div class="carrito-footer">

<b>Total: $<span id="total">0</span></b>

<button class="vaciar" onclick="vaciarCarrito()">
🗑 Vaciar carrito
</button>

<button class="whatsapp" onclick="enviarWhatsApp()">
Enviar pedido por WhatsApp
</button>

</div>

</div>

<!-- PRODUCTO EJEMPLO -->

<div style="padding:20px">

<h2>SUPERVIN 210 BLANCO OSTIÓN</h2>

<p><b>$3176</b></p>

<button class="agregar" onclick="agregarProducto('SUPERVIN 210 BLANCO OSTIÓN',3176)">
Agregar al carrito
</button>

</div>

<script>

let carrito=[]

function abrirCarrito(){
document.getElementById("panelCarrito").classList.add("activo")
}

function cerrarCarrito(){
document.getElementById("panelCarrito").classList.remove("activo")
}

function agregarProducto(nombre,precio){

let producto=carrito.find(p=>p.nombre===nombre)

if(producto){
producto.cantidad++
}else{
carrito.push({nombre,precio,cantidad:1})
}

actualizarCarrito()
abrirCarrito()
}

function actualizarCarrito(){

let lista=document.getElementById("listaCarrito")
let total=0
let contador=0

lista.innerHTML=""

carrito.forEach((producto,index)=>{

let subtotal=producto.precio*producto.cantidad
total+=subtotal
contador+=producto.cantidad

lista.innerHTML+=`

<div class="item">

<b>${producto.nombre}</b><br>

$${producto.precio}

<div class="cantidad">

<button onclick="cambiarCantidad(${index},-1)">-</button>

${producto.cantidad}

<button onclick="cambiarCantidad(${index},1)">+</button>

</div>

Subtotal: $${subtotal}

</div>

`

})

document.getElementById("total").innerText=total
document.getElementById("contador").innerText=contador

}

function cambiarCantidad(index,cambio){

carrito[index].cantidad+=cambio

if(carrito[index].cantidad<=0){
carrito.splice(index,1)
}

actualizarCarrito()

}

function vaciarCarrito(){

carrito=[]
actualizarCarrito()

}

function enviarWhatsApp(){

let mensaje="Pedido Pintumex:%0A"

carrito.forEach(p=>{
mensaje+=`${p.nombre} x${p.cantidad} = $${p.precio*p.cantidad}%0A`
})

mensaje+=`Total: $${document.getElementById("total").innerText}`

window.open(`https://wa.me/5217770000000?text=${mensaje}`)

}

</script>

</body>
</html>
