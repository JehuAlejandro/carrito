<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producto</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.producto{
  background: #ffffff;
  padding: 30px;
  width: 320px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: center;
  transition: 0.3s;
}

.producto:hover{
  transform: translateY(-5px);
}

.producto h2{
  margin-bottom: 5px;
}

.precio{
  font-size: 20px;
  color: #555;
  margin-bottom: 20px;
}

.contador{
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
}

.btn{
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.menos{
  background: #e0e0e0;
}

.mas{
  background: #000;
  color: #fff;
}

.btn:hover{
  transform: scale(1.1);
}

input{
  width: 60px;
  text-align: center;
  font-size: 18px;
  border: none;
  background: #f0f0f0;
  padding: 8px;
  border-radius: 10px;
}

input:focus{
  outline: none;
  background: #e8e8e8;
}
</style>
</head>

<body>

<div class="producto">
  <h2>Nombre del Producto</h2>
  <div class="precio">$150.00</div>

  <div class="contador">
    <button class="btn menos" onclick="disminuir()">−</button>
    <input type="number" id="cantidad" value="1" min="1">
    <button class="btn mas" onclick="aumentar()">+</button>
  </div>
</div>

<script>
function aumentar(){
  let cantidad = document.getElementById("cantidad");
  cantidad.value = parseInt(cantidad.value) + 1;
}

function disminuir(){
  let cantidad = document.getElementById("cantidad");
  if(cantidad.value > 1){
    cantidad.value = parseInt(cantidad.value) - 1;
  }
}
</script>

</body>
</html>
