<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pintumex</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* BOTON CARRITO */

.boton-carrito{
position:fixed;
top:20px;
right:20px;
background:#0aa84f;
color:white;
border:none;
padding:12px 15px;
border-radius:50px;
font-size:18px;
cursor:pointer;
}

/* CARRITO COMPLETO */

.carrito{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
display:none;
}

.carrito h2{
margin-top:0;
}

.item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.cantidad{
display:flex;
gap:10px;
margin-top:5px;
align-items:center;
}

.cantidad button{
background:#ddd;
border:none;
padding:5px 10px;
cursor:pointer;
border-radius:5px;
}

.vaciar{
width:100%;
background:#ff4d4d;
color:white;
border:none;
padding:12px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.whatsapp{
width:100%;
background:#25D366;
color:white;
border:none;
padding:12px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.agregar{
background:#0aa84f;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}

.producto{
padding:20px;
}

</style>
</head>

<body>

<h1 style="padding:20px;">Pintumex</h1>

<!-- BOTON CARRITO -->

<button class="boton-carrito" onclick="mostrarCarrito()">
🛒 <span id="contador">0</span>
</button>

<!-- CARRITO -->

<div id="carrito" class="carrito">

<h2>Tu carrito</h2>

<div id="listaCarrito"></div>

<h3>Total: $<span id="total">0</span></h3>

<button class="vaciar" onclick="vaciarCarrito()">
🗑 Vaciar carrito
</button>

<button class="whatsapp" onclick="enviarWhatsApp()">
Enviar pedido por WhatsApp
</button>

</div>

<!-- PRODUCTO EJEMPLO -->

<div class="producto">

<h2>SUPERVIN 210 BLANCO OSTIÓN</h2>

<p><b>$3176</b></p>

<button class="agregar" onclick="agregarProducto('SUPERVIN 210 BLANCO OSTIÓN',3176)">
Agregar al carrito
</button>

</div>

<script>

let carrito=[]

function mostrarCarrito(){

let carritoDiv=document.getElementById("carrito")

if(carritoDiv.style.display==="none"){
carritoDiv.style.display="block"
}else{
carritoDiv.style.display="none"
}

}

function agregarProducto(nombre,precio){

let producto=carrito.find(p=>p.nombre===nombre)

if(producto){
producto.cantidad++
}else{
carrito.push({nombre,precio,cantidad:1})
}

actualizarCarrito()

}

function actualizarCarrito(){

let lista=document.getElementById("listaCarrito")
let total=0
let contador=0

lista.innerHTML=""

carrito.forEach((producto,index)=>{

let subtotal=producto.precio*producto.cantidad
total+=subtotal
contador+=producto.cantidad

lista.innerHTML+=`

<div class="item">

<b>${producto.nombre}</b><br>

Precio: $${producto.precio}

<div class="cantidad">

<button onclick="cambiarCantidad(${index},-1)">-</button>

${producto.cantidad}

<button onclick="cambiarCantidad(${index},1)">+</button>

</div>

Subtotal: $${subtotal}

</div>

`

})

document.getElementById("total").innerText=total
document.getElementById("contador").innerText=contador

}

function cambiarCantidad(index,cambio){

carrito[index].cantidad+=cambio

if(carrito[index].cantidad<=0){
carrito.splice(index,1)
}

actualizarCarrito()

}

function vaciarCarrito(){

carrito=[]
actualizarCarrito()

}

function enviarWhatsApp(){

let mensaje="Pedido Pintumex:%0A"

carrito.forEach(p=>{
mensaje+=`${p.nombre} x${p.cantidad} = $${p.precio*p.cantidad}%0A`
})

mensaje+=`Total: $${document.getElementById("total").innerText}`

window.open(`https://wa.me/5217771537270?text=${mensaje}`)

}

</script>

</body>
</html>
