<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producto Pintumex</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: #f2f5f9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.producto{
  background: #ffffff;
  padding: 30px;
  width: 320px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  text-align: center;
  border-top: 6px solid #0b3d91; /* Azul Pintumex */
  transition: 0.3s;
}

.producto:hover{
  transform: translateY(-5px);
}

.producto h2{
  margin-bottom: 5px;
  color: #0b3d91;
}

.precio{
  font-size: 22px;
  color: #333;
  margin-bottom: 20px;
  font-weight: bold;
}

.contador{
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
}

.btn{
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

/* Botón disminuir */
.menos{
  background: #e6e6e6;
  color: #333;
}

/* Botón aumentar */
.mas{
  background: #0b3d91; /* Azul principal */
  color: #fff;
}

/* Efecto hover */
.btn:hover{
  transform: scale(1.1);
}

/* Campo cantidad */
input{
  width: 60px;
  text-align: center;
  font-size: 18px;
  border: 2px solid #0b3d91;
  background: #fff;
  padding: 8px;
  border-radius: 10px;
  font-weight: bold;
}

input:focus{
  outline: none;
  border-color: #ffcc00; /* Amarillo acento */
  box-shadow: 0 0 5px rgba(255,204,0,0.6);
}
</style>
</head>

<body>

<div class="producto">
  <h2>450SR BLANCO BTE</h2>
  <div class="precio">$150.00</div>

  <div class="contador">
    <button class="btn menos" onclick="disminuir()">−</button>
    <input type="number" id="cantidad" value="1" min="1">
    <button class="btn mas" onclick="aumentar()">+</button>
  </div>
</div>

<script>
function aumentar(){
  let cantidad = document.getElementById("cantidad");
  cantidad.value = parseInt(cantidad.value) + 1;
}

function disminuir(){
  let cantidad = document.getElementById("cantidad");
  if(cantidad.value > 1){
    cantidad.value = parseInt(cantidad.value) - 1;
  }
}
</script>

</body>
</html>
