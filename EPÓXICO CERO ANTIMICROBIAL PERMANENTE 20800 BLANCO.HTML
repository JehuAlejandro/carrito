<style>
*{box-sizing:border-box;}

body{

</style>
</head>

<body>

<div class="header">
<div class="logo">Pintumex</div>

<div class="carrito" onclick="irCarrito()">
🛒
<div class="burbuja" id="contador">0</div>
</div>
</div>

<section class="seccion">

<div class="contenido">

<div class="col-img">
<img src="https://pintumex.com.mx/wp-content/uploads/Mock-Up-2024-Cero-Epoxico-4-L.png" class="imagen">
</div>

<div class="col-info">

<div class="badge">Línea Profesional</div>

<h1>EPÓXICO CERO ANTIMICROBIAL PERMANENTE 20800 BLANCO</h1>

<div class="subtitulo">
Recubrimiento anticorrosivo de uso industrial y comercial.
</div>

<div class="precio">Presentaciones disponibles</div>

<button class="btn btn-verde" onclick="agregar('EPÓXICO CERO 20800 BLANCO 4L',2025,this)">
🛒 Agregar 4L – $2,025
</button>

<button class="btn btn-verde" onclick="agregar('CATALIZADOR PRA21 1L',553,this)">
🛒 Agregar Catalizador PRA21 1L – $553
</button>

<div class="info">
<div>🚚 Envío Gratis</div>
<div>✔ Stock Disponible</div>
</div>

</div>

</div>

</section>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar(){
localStorage.setItem("carrito", JSON.stringify(carrito));
}

function actualizar(){
let total = 0;
carrito.forEach(p => total += p.cantidad);
document.getElementById("contador").textContent = total;
}

function agregar(nombre, precio, boton){

const existe = carrito.find(p => p.nombre === nombre);

if(existe){
existe.cantidad++;
}else{
carrito.push({
nombre: nombre,
precio: precio,
cantidad: 1
});
}

guardar();
actualizar();

const original = boton.innerHTML;
boton.innerHTML = "Agregado ✔";
boton.style.background = "#2968c8";

setTimeout(()=>{
boton.innerHTML = original;
boton.style.background = "#00a650";
},400);

}

function irCarrito(){
window.location.href = "carrito.html";
}

actualizar();

</script>

</body>
</html>
