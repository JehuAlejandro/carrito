}

.seccion{

.btn{

<body>

</div>


<section class="seccion">

<div class="contenido">

<div class="col-img">

<img src="https://dm.henkel-dam.com/is/image/henkel/Fester-Fibratado-blanco-19-L--2?wid=768&fmt=webp&qlt=85&fit=hfit%2C1" class="imagen" class="imagen">

</div>

<div class="badge">Línea Profesional</div>

<div class="subtitulo">
Impermeabilizante acrílico elastomérico base agua de secado rápido

  <button class="btn" onclick="agregar('A 3 AÑOS BLANCO Cub 19L',2025,this)">

  </button>

  <button class="btn" onclick="agregar('A 5 AÑOS BLANCO Cub 19L',2329,this)">
    🛒 A 5 AÑOS BLANCO Cub 19L – $2,329

  <button class="btn" onclick="agregar('A 5 AÑOS BLANCO FIBRATADO Cub 19L',2543,this)">
    🛒 A 5 AÑOS BLANCO FIBRATADO Cub 19L – $2,543
  </button>

  <button class="btn" onclick="agregar('A 7 AÑOS BLANCO Cub 19L',2712,this)">
    🛒 A 7 AÑOS BLANCO Cub 19L – $2,712
  </button>

  <button class="btn" onclick="agregar('A 3 AÑOS BLANCO Cub 4L',476,this)">
    🛒 A 3 AÑOS BLANCO Cub 4L – $476
  </button>

</div>
 <div class="info">
        <div>🚚 Envío Gratis</div>
        <div>✔ Stock Disponible</div>
      </div>
</div>

</section>


<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar(){

localStorage.setItem("carrito", JSON.stringify(carrito));

}

function actualizar(){

let total = 0;

carrito.forEach(p => total += p.cantidad);

document.getElementById("contador").textContent = total;

}

function agregar(nombre, precio, boton){

const existe = carrito.find(p => p.nombre === nombre);

if(existe){

existe.cantidad++;

}else{

carrito.push({

nombre:nombre,
precio:precio,
cantidad:1

});

}

guardar();
actualizar();

const original = boton.innerHTML;

boton.innerHTML = "Agregado ✔";

setTimeout(()=>{

boton.innerHTML = original;

},600);

}

function irCarrito(){

window.location.href = "carrito.html";

}
actualizar();
</script>
